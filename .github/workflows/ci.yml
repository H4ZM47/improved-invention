name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - "claude/**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.2.2
          install-mode: binary
          args: --version

      - name: Run tests
        run: make test

      - name: Run build
        run: make build

      - name: Run lint
        run: make lint

      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: task-linux-amd64-dev
          path: dist/task
